# idk-client-qt configuration file
# Place at ~/.config/idk-client-qt.conf
# Usage: idk-client-qt [--socket PATH] [--tray] [config.ini]

[General]
# Socket path to idk-overlay receiver
# Can also be overridden via --socket CLI option or IDK_SOCKET_PATH env var
Socket=/tmp/idk-overlay

# ── Overlay groups ────────────────────────────────────────────────────────
# Each [Overlay_N] group defines a webview overlay.
# N is the overlay ID (1-based, matches idk-overlay overlay ID).

[Overlay_1]
# Screen position (top-left corner)
X=0
Y=0

# Frame dimensions (pixels)
Width=1280
Height=720

# URL to render (web page, local file, etc.)
Url=https://example.com

# Optional: JavaScript to inject after page load
# InjectScript=/path/to/script.js
